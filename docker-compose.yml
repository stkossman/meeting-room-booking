services:
  postgres:
    image: postgres:18-alpine
    container_name: meeting_room_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
      POSTGRES_DB: booking_db
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
